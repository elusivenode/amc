<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page Not Found | Australian Math Coach</title>
    <meta
      name="description"
      content="The page you are looking for could not be found. Return to Australian Math Coach to explore programs and book a free first session."
    />
    <style>
      :root {
        color-scheme: light;
        --brand-blue: #204585;
        --brand-blue-dark: #1a3a70;
        --page-bg: #f8fafc;
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --border: #e2e8f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background: linear-gradient(180deg, #ffffff 0%, var(--page-bg) 100%);
        color: var(--text-primary);
      }

      .shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(100%, 720px);
        background: #ffffff;
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
        padding: 40px 32px;
        text-align: center;
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--brand-blue);
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(48px, 10vw, 88px);
        line-height: 0.95;
      }

      h2 {
        margin: 16px 0 0;
        font-size: clamp(28px, 4vw, 40px);
        line-height: 1.1;
      }

      p {
        margin: 18px auto 0;
        max-width: 36rem;
        color: var(--text-secondary);
        font-size: 18px;
        line-height: 1.7;
      }

      .actions {
        margin-top: 32px;
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 180px;
        padding: 14px 20px;
        border-radius: 12px;
        border: 1px solid transparent;
        font-weight: 700;
        text-decoration: none;
        transition: background-color 160ms ease, border-color 160ms ease, color 160ms ease;
      }

      .button-primary {
        background: var(--brand-blue);
        color: #ffffff;
      }

      .button-primary:hover {
        background: var(--brand-blue-dark);
      }

      .button-secondary {
        background: #ffffff;
        color: var(--brand-blue);
        border-color: #cbd5e1;
      }

      .button-secondary:hover {
        background: #eff6ff;
        border-color: #93c5fd;
      }

      @media (max-width: 640px) {
        .card {
          padding: 32px 24px;
        }

        .actions {
          flex-direction: column;
        }

        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-labelledby="not-found-title">
        <p class="eyebrow">Australian Math Coach</p>
        <h1>404</h1>
        <h2 id="not-found-title">Page Not Found</h2>
        <p>
          The page you are looking for does not exist or may have moved. You can return to the homepage or get in touch to book a free first session.
        </p>
        <div class="actions">
          <a class="button button-primary" href="/">Go Home</a>
          <a class="button button-secondary" href="/contact/">Contact Hamish</a>
        </div>
      </section>
    </main>
  </body>
</html>
